name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          expected_tag="v$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "$expected_tag" || {
            echo "Tag $RELEASE_TAG does not match package version tag $expected_tag" >&2
            exit 1
          }

      - name: Build source archive and checksum
        run: npm run pack:source

      - name: Verify release checksum
        run: (cd dist && sha256sum -c ./*.tar.gz.sha256)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          gh release create "$RELEASE_TAG" dist/*
          --repo "$GITHUB_REPOSITORY"
          --title "$RELEASE_TAG"
          --generate-notes
          --verify-tag
